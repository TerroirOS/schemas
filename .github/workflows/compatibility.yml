name: Compatibility

on:
  pull_request:
  workflow_dispatch:

jobs:
  semver-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Schema compatibility guard
        run: npm run check:compat
